services:
  - type: web
    name: sc-datapad
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 60
    envVars:
      - key: FLASK_ENV
        value: production
      - key: DB_PATH
        value: /opt/render/project/src/sc_datapad.db
    disk:
      name: sc-datapad-db
      mountPath: /opt/render/project/src
      sizeGB: 1
